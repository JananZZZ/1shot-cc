{% extends "base.html" %}
{% block content %}
<div class="page-hero"><h1>📥 安装 Node.js</h1><p>这是让 Claude Code 能跑起来的"地基"，必须最先装好</p></div>
<div class="install-panel">
  <div class="install-icon" id="icon">📦</div>
  <h3 id="status-text">准备帮你装 Node.js</h3>
  <p class="text-sm text-muted">从国内镜像下载，速度很快，大概 1-3 分钟</p>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="fill" id="bar" style="width:0"></div></div>
    <p id="pct-text" class="text-xs text-muted">等待开始...</p>
  </div>
  <button class="btn btn-primary btn-lg" id="start-btn" onclick="doInstall()">📥 帮我装好 Node.js</button>
  <button class="btn btn-outline mt-2" id="retry-btn" style="display:none" onclick="doInstall()">🔄 再试一次</button>
  <div id="next-step" class="mt-2" style="display:none">
    <a href="/wizard/git" class="btn btn-accent">继续下一步 → Git 安装</a>
  </div>
</div>
<div class="callout info">💡 <strong>小知识：</strong>Node.js 就像电脑的"翻译官"，让 Claude Code 说的话能被你的电脑听懂。装好之后还会自动给你配上国内下载加速通道。</div>
{% endblock %}
{% block scripts %}<script>
const w = new InstallWizard(() => API.installNodeJS(), { title:"安装 Node.js", successMsg:"Node.js 装好了！" });
function doInstall(){ w.start(); }
</script>{% endblock %}
