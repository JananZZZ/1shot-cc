{% extends "base.html" %}
{% block content %}
<div class="page-hero"><h1>安装 Node.js</h1><p>这是"地基"，必须先装</p></div>
<div class="install-panel">
  <div class="install-icon" id="icon">📦</div>
  <h3 id="status-text">准备帮你装 Node.js</h3>
  <p class="text-sm text-muted">从国内镜像下载，大约 1-3 分钟</p>
  <div class="progress-wrap"><div class="progress-bar"><div class="fill" id="bar" style="width:0"></div></div><p id="pct-text" class="text-xs text-muted">等待开始...</p></div>
  <button class="btn btn-primary btn-lg" id="start-btn" onclick="doInstall()">📥 帮我装好 Node.js</button>
  <button class="btn btn-outline mt-2" id="retry-btn" style="display:none" onclick="doInstall()">🔄 再试一次</button>
  <div id="next-step" class="mt-2" style="display:none"><a href="/wizard/git" class="btn btn-accent">继续 → 装 Git</a></div>
</div>
<div class="callout info">💡 <strong>这是啥：</strong>Node.js 让 Claude Code 说的话能被你电脑听懂。装好后会自动配上国内下载加速通道。</div>
{% endblock %}{% block scripts %}<script>const w=new InstallWizard(()=>API.installNodeJS(),{successMsg:"Node.js 装好了！"});function doInstall(){w.start();}</script>{% endblock %}
