<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1shot-CC — Claude Code 一键安装向导</title>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/wizard.css">
<link rel="stylesheet" href="/static/css/tutorial.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="brand">🚀 1shot-CC</a>
  <div class="nav-links">
    <a href="/welcome" target="_blank" class="nav-welcome">🏠 欢迎页</a>
    <div class="tutorial-dropdown" id="tutorial-dropdown">
      <button class="dropbtn" id="tutorial-toggle">📚 教程指南 ▾</button>
      <div class="dropdown-content" id="tutorial-menu">
        <a href="/tutorial/claude" target="_blank">📘 Claude Code 使用指南</a>
        <a href="/tutorial/apikey" target="_blank">🔑 获取 API 密钥教程</a>
        <a href="/tutorial/ccswitch" target="_blank">🔀 CC-Switch 使用教程</a>
        <a href="/tutorial/proxy" target="_blank">🌐 科学上网指南</a>
      </div>
    </div>
    <a href="/wizard/check">🔍 系统检测</a>
    <a href="/wizard/config">⚙️ API 配置</a>
    <a href="/wizard/uninstall">🗑️ 一键卸载</a>
    <a href="#" onclick="launchClaude()">🤖 启动 Claude Code</a>
    <a href="https://github.com/JananZZZ/1shot-cc" target="_blank" class="nav-github">⭐ 点亮 GitHub</a>
    <a href="#" onclick="exitApp()" class="nav-exit">🚪 退出</a>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/wizard.js"></script>
<script>
// 全局：显示"已安装"绿色卡片 + 显示下一步按钮
function showInstalledCard(name, version, outdated, showActions) {
  var panel = document.querySelector('.install-panel');
  if (!panel) return;
  var vtext = version ? ' (' + version + ')' : '';
  var extra = '';
  if (outdated) {
    extra = '<p class="text-sm" style="color:var(--amber);margin-top:8px;">⚠️ 版本过旧，建议升级到最新版</p>';
  }
  var actions = '';
  if (showActions) {
    actions = '<div class="flex flex-wrap gap-2 justify-center mt-2"><button class="btn btn-outline btn-sm" onclick="launchCCS()">🚀 启动 CC Switch</button><a href="/tutorial/ccswitch" target="_blank" class="btn btn-outline btn-sm">📖 CC Switch 指南</a></div>';
  }
  var nextText = showActions ? '' : '<p class="text-muted">可以直接进入下一步</p>';
  panel.innerHTML = '<div class="callout success text-center" style="padding:32px;"><div style="font-size:2rem;">✅</div><h3>' + name + ' 已安装' + vtext + '</h3>' + extra + actions + nextText + '</div>';
  var next = document.getElementById('next-step');
  if (next) next.style.display = 'block';
}
async function launchCCS(){try{await API.launchCCSwitch();showToast('CC Switch 正在启动','success');}catch(e){showToast('启动失败，请从开始菜单手动打开','warning');}}

// 全局：统一检测缓存
var CHECK_CACHE_KEY = '1shot-cc-check-all';
var CHECK_CACHE_TTL = 300000; // 5 minutes

function getCheckCache() {
  var raw = sessionStorage.getItem(CHECK_CACHE_KEY);
  if (!raw) return null;
  try {
    var d = JSON.parse(raw);
    if (Date.now() - d.ts > CHECK_CACHE_TTL) { sessionStorage.removeItem(CHECK_CACHE_KEY); return null; }
    return d.data;
  } catch(e) { return null; }
}

function setCheckCache(data) {
  sessionStorage.setItem(CHECK_CACHE_KEY, JSON.stringify({ts: Date.now(), data: data}));
}

function clearCheckCache() {
  sessionStorage.removeItem(CHECK_CACHE_KEY);
}
</script>
<script>
// 教程下拉菜单 — click toggle
(function() {
  const toggle = document.getElementById("tutorial-toggle");
  const menu = document.getElementById("tutorial-menu");
  if (!toggle || !menu) return;
  toggle.addEventListener("click", function(e) {
    e.stopPropagation();
    menu.classList.toggle("show");
  });
  document.addEventListener("click", function() {
    menu.classList.remove("show");
  });
})();

async function exitApp(){try{await fetch('/api/system/shutdown',{method:'POST'});}catch(e){}document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;font-family:inherit;"><div><div style="font-size:3rem;">👋</div><h2 style="color:var(--t1);">拜拜~再会。</h2></div></div>';var w=window.open('','_self','');w.close();setTimeout(function(){if(!window.closed)window.close();},500);}
async function launchClaude(){try{await API.launchClaude();showToast('Claude Code 正在启动','success');}catch(e){showToast('启动失败，请手动打开终端输入 claude','error');}}

// 页面引用计数 — 只有所有页面关闭后才退出后台
(function() {
  var pageId = sessionStorage.getItem('1shot-cc-page-id');
  if (!pageId) {
    pageId = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    sessionStorage.setItem('1shot-cc-page-id', pageId);
  }

  // 页面打开时注册
  fetch('/api/system/page-open', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({page_id: pageId})
  }).catch(function() {});

  // 兜底心跳（30s，仅用于防止僵尸页面）
  setInterval(function() {
    fetch('/api/system/heartbeat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({page_id: pageId})
    }).catch(function() {});
  }, 30000);

  // 页面关闭时通知（sendBeacon 保证送达）
  window.addEventListener('beforeunload', function() {
    var data = JSON.stringify({page_id: pageId});
    navigator.sendBeacon('/api/system/page-closed', new Blob([data], {type: 'application/json'}));
  });
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
