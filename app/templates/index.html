{% extends "base.html" %}
{% block content %}

<div class="page-hero mt-3">
  <h1 class="fs-hero">Claude Code，装得明明白白</h1>
  <p>不用懂命令行，不用查教程，跟着点几下就好</p>
</div>

<div class="callout success mt-3 text-center" style="max-width:560px;margin-left:auto;margin-right:auto;border-left:none;">
  💡 <strong>建议：</strong>右键 1shot-CC.exe → 选择<strong>"以管理员身份运行"</strong>，否则安装 Node.js、Git 等系统软件可能失败。
</div>

<div class="max-w-560 mt-3">
  <div class="grid-2">
    <div class="card text-center fade-in-up stagger-1">
      <div class="fs-xl mb-1">🔍</div>
      <div class="fw-700 fs-lg">先看看缺什么</div>
      <div class="text-sm text-muted mt-1">自动检查电脑环境</div>
    </div>
    <div class="card text-center fade-in-up stagger-2">
      <div class="fs-xl mb-1">📥</div>
      <div class="fw-700 fs-lg">一键全装好</div>
      <div class="text-sm text-muted mt-1">缺什么点什么，自动装</div>
    </div>
    <div class="card text-center fade-in-up stagger-3">
      <div class="fs-xl mb-1">⚙️</div>
      <div class="fw-700 fs-lg">接上 AI 服务</div>
      <div class="text-sm text-muted mt-1">支持 5 家国内主流服务商</div>
    </div>
    <div class="card text-center fade-in-up stagger-4">
      <div class="fs-xl mb-1">📖</div>
      <div class="fw-700 fs-lg">手把手教会</div>
      <div class="text-sm text-muted mt-1">每一步都有图文教程</div>
    </div>
    <div class="card text-center fade-in-up stagger-5" style="grid-column: 1 / -1; max-width: 280px; justify-self: center;">
      <a href="/wizard/uninstall" style="text-decoration:none;color:inherit;">
      <div class="fs-xl mb-1">🗑️</div>
      <div class="fw-700 fs-lg">一键卸载</div>
      <div class="text-sm text-muted mt-1">清理已安装的软件</div>
      </a>
    </div>
  </div>
</div>

<div class="text-center mt-4 fade-in-up stagger-5">
  <a href="/wizard/check" class="hero-cta">🔍 先看看电脑还缺什么 →</a>
  <p class="text-muted text-sm mt-2">
    或者先逛逛 <a href="/tutorial/claude" target="_blank" style="color:var(--brand);">新手教程</a>
  </p>
</div>
{% endblock %}
