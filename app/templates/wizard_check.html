{% extends "base.html" %}
{% block content %}
<div class="steps-bar">
  <a href="/wizard/check" class="step active"><span class="step-dot">1</span><span class="step-label">检测</span></a>
  <span class="step-line"></span>
  <a href="/wizard/nodejs" class="step"><span class="step-dot">2</span><span class="step-label">Node.js</span></a>
  <span class="step-line"></span>
  <a href="/wizard/git" class="step"><span class="step-dot">3</span><span class="step-label">Git</span></a>
  <span class="step-line"></span>
  <a href="/wizard/claude" class="step"><span class="step-dot">4</span><span class="step-label">Claude</span></a>
  <span class="step-line"></span>
  <a href="/wizard/config" class="step"><span class="step-dot">5</span><span class="step-label">API</span></a>
  <span class="step-line"></span>
  <a href="/wizard/ccswitch" class="step"><span class="step-dot">6</span><span class="step-label">Switch</span></a>
  <span class="step-line"></span>
  <a href="/wizard/terminal" class="step"><span class="step-dot">7</span><span class="step-label">美化</span></a>
  <span class="step-line"></span>
  <a href="/wizard/summary" class="step"><span class="step-dot">8</span><span class="step-label">收尾</span></a>
  <span class="step-line"></span>
  <a href="/wizard/final" class="step"><span class="step-dot">9</span><span class="step-label">完成</span></a>
</div>
<div class="page-hero"><h1>先看看电脑还缺什么</h1><p>自动帮你检查一遍，缺什么一目了然</p></div>

<div class="wizard-nav" id="wizard-nav">
  <a href="/" class="btn btn-outline">← 首页</a>
  <a href="/wizard/nodejs" class="btn btn-accent" id="btn-next">下一步 → 装 Node.js</a>
  <a href="/wizard/final" class="btn btn-accent" id="btn-finish" style="display:none;">🎉 完成配置</a>
</div>

<div class="summary-box mt-2 max-w-560" id="summary-box" style="display:none;">
  <div class="summary-body" id="summary-body"></div>
</div>

<div class="callout info mt-2 max-w-560">
  💡 <strong>提示：</strong>按照顺序依次操作即可。小项可在第⑧步"收尾检查"中一键修复。
</div>

<div id="loading" class="loading-pulse">
  <span class="pulse-dot"></span>
  <span class="text-muted">正在检查你的电脑...</span>
</div>

<div id="results" style="display:none;">
  <div id="cards-container" class="max-w-560"></div>
  <div class="text-center mt-3">
    <button class="btn btn-outline btn-sm" onclick="forceRecheck()">🔄 重新检测</button>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function forceRecheck() { clearCheckCache(); API.clearCheckCache(); location.reload(); }

const ITEMS = [
  { key:"nodejs",   name:"Node.js — 运行环境",          desc:"让 Claude Code 能跑起来的基础",   installUrl:"/wizard/nodejs" },
  { key:"git",      name:"Git — 版本管理",              desc:"记录代码变化，Windows 上必需",     installUrl:"/wizard/git" },
  { key:"claude_code", name:"Claude Code",              desc:"AI 编程伙伴，今天的主角",          installUrl:"/wizard/claude" },
  { key:"ccswitch", name:"CC-Switch — 配置管家",        desc:"轻松切换不同 AI 服务商",           installUrl:"/wizard/ccswitch" },
  { key:"npm_registry", name:"下载加速通道",            desc:"从国内镜像下载，快很多",           fixUrl:"/wizard/summary" },
  { key:"powershell_policy", name:"系统安全设置",       desc:"太严格会导致安装失败",             fixUrl:"/wizard/summary" },
  { key:"windows_terminal", name:"Windows Terminal",    desc:"现代化的终端工具",                 installUrl:"/wizard/terminal" },
  { key:"colorcc",  name:"Color-cc 终端美化",           desc:"Oh My Posh 状态栏主题",            installUrl:"/wizard/terminal" },
  { key:"claude_config", name:"启动配置",               desc:"确保能正常启动的配置文件",         fixUrl:"/wizard/summary" },
  { key:"path_issues", name:"用户名检查",               desc:"检查电脑用户名有没有中文",         fixUrl:"/wizard/summary" },
];

var OPTIONAL = ["ccswitch", "colorcc", "windows_terminal", "claude_config"];
function renderCard(item, data) {
  var status, icon, detail;
  if (!data) {
    status = "warn"; icon = "⚠️";
    detail = `<span class="check-detail warn">检测失败</span>`;
  } else if (data.ok) {
    status = "ok"; icon = "✅";
    if (data.version) {
      detail = `<span class="check-detail ok">v${data.version} 已安装</span>`;
      if (data.outdated) detail += ` <span class="check-detail warn">（可升级到 v${data.latest_version}）</span>`;
    } else {
      detail = `<span class="check-detail ok">已配置</span>`;
    }
  } else if (data.installed) {
    status = "warn"; icon = "⚠️";
    detail = `<span class="check-detail warn">已安装，按需调整</span>`;
  } else if (OPTIONAL.indexOf(item.key) >= 0) {
    status = "warn"; icon = "⚠️";
    detail = `<span class="check-detail warn">未安装（非必需）</span>`;
  } else {
    status = "err"; icon = "❌";
    detail = `<span class="check-detail err">未安装</span>`;
  }
  var action = "";
  if (status === "err" && item.installUrl) {
    action = `<a href="${item.installUrl}" class="btn btn-primary btn-sm">📥 去安装</a>`;
  } else if (status === "err" && item.fixUrl) {
    action = `<a href="${item.fixUrl}" class="btn btn-outline btn-sm">🔧 去修复</a>`;
  } else if (status === "warn" && item.fixUrl) {
    action = `<a href="${item.fixUrl}" class="btn btn-outline btn-sm">🔧 去修复</a>`;
  } else if (status === "warn" && item.installUrl) {
    action = `<a href="${item.installUrl}" class="btn btn-outline btn-sm">📦 查看</a>`;
  } else if (status === "ok" && item.installUrl) {
    action = `<a href="${item.installUrl}" class="btn btn-outline btn-sm">📦 查看</a>`;
  }
  return `<div class="status-card status-${status}" id="card-${item.key}">
    <div class="flex items-center gap-3">
      <div class="check-icon">${icon}</div>
      <div class="check-body">
        <div class="check-title">${item.name}</div>
        <div class="check-desc">${item.desc}</div>
        ${detail}
      </div>
      <div class="check-action">${action}</div>
    </div>
  </div>`;
}

async function loadAll() {
  let data = getCheckCache();
  if (!data) {
    try {
      const resp = await API.checkAll();
      if (!resp.success) throw new Error("检测失败");
      data = resp.data;
      setCheckCache(data);
    } catch(e) {
      document.getElementById("loading").innerHTML = `<p style="color:var(--red);">❌ 检测出错: ${e.message}</p><button class="btn btn-outline mt-2" onclick="location.reload()">再试一次</button>`;
      return;
    }
  }
  document.getElementById("loading").style.display = "none";
  document.getElementById("results").style.display = "block";
  document.getElementById("summary-box").style.display = "none";
  var html = "";
  for (var i = 0; i < ITEMS.length; i++) {
    var item = ITEMS[i];
    html += renderCard(item, data[item.key]);
  }
  document.getElementById("cards-container").innerHTML = html;
  var ready = data.ready;
  var sb = document.getElementById("summary-box");
  var sbody = document.getElementById("summary-body");
  sb.style.display = "block";
  if (ready) {
    sb.classList.add("ready");
    sbody.innerHTML = `<div class="text-center"><span style="font-size:2rem;">🎉</span><h3>环境就绪</h3><p class="text-muted">所有必需组件已安装，可以直接开始配置 API！</p></div>`;
    document.getElementById("btn-next").textContent = "下一步 → 装 Node.js（可选）";
    document.getElementById("btn-finish").style.display = "inline-flex";
  } else {
    sbody.innerHTML = `<p class="text-muted">还有 <strong>${Object.values(data).filter(d=>d&&!d.ok).length}</strong> 项需要处理，按上方步骤依次操作即可</p>`;
  }
}

loadAll();
</script>
{% endblock %}
