{% extends "base.html" %}
{% block content %}
<div class="page-hero">
  <h1>🔍 先看看电脑还缺什么</h1>
  <p>自动帮你检查一遍，该装什么、该改什么，一目了然</p>
</div>

<div id="loading" class="text-center" style="padding:48px;">
  <p style="font-size:1.2rem;">⏳ 正在检查你的电脑...</p>
  <div class="progress-bar mt-2" style="max-width:300px; margin:12px auto;"><div class="fill" style="width:80%; animation: shimmer 2s infinite;"></div></div>
</div>

<div id="results" style="display:none;">
  <div id="check-list"></div>

  <div id="summary-box" class="summary-box" style="display:none;">
    <div class="flex items-center gap-2 mb-2">
      <span id="summary-icon" style="font-size:1.5rem;"></span>
      <span id="summary-title" style="font-weight:700; font-size:1.05rem;"></span>
    </div>
    <div id="summary-detail" class="text-sm text-muted mb-2"></div>
    <div class="flex flex-wrap gap-2" id="action-buttons"></div>
  </div>

  <div class="text-center mt-3">
    <button class="btn btn-ghost btn-sm" onclick="forceRecheck()">🔄 重新检查一遍</button>
    <span class="text-xs text-muted" style="margin-left:8px;">上次检查：<span id="last-time">-</span></span>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const CACHE_KEY = "1shot-v2-check";
const CACHE_TTL = 5 * 60 * 1000;

function getCache() {
  try {
    const raw = sessionStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const c = JSON.parse(raw);
    if (Date.now() - c.ts > CACHE_TTL) { sessionStorage.removeItem(CACHE_KEY); return null; }
    return c.data;
  } catch (e) { return null; }
}
function setCache(data) { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); }
function forceRecheck() { sessionStorage.removeItem(CACHE_KEY); location.reload(); }

const ITEMS = [
  { key:"nodejs", name:"Node.js — 运行环境", desc:"让 Claude Code 能在你电脑上跑起来的基础工具", installUrl:"/wizard/nodejs" },
  { key:"git", name:"Git — 版本管理", desc:"管理代码改动的小帮手，Windows 上必需", installUrl:"/wizard/git" },
  { key:"powershell_policy", name:"系统安全设置", desc:"安全策略太严格的话，安装会失败", fixAction:"policy" },
  { key:"npm_registry", name:"下载加速通道", desc:"用国内镜像下载，速度快很多倍", fixAction:"registry" },
  { key:"claude_code", name:"Claude Code — 主角", desc:"这就是我们要装的 AI 编程伙伴", installUrl:"/wizard/claude" },
  { key:"ccswitch", name:"CC-Switch — 配置管家", desc:"帮你轻松切换不同的 AI 服务商，不用手动改文件", installUrl:"/wizard/ccswitch", launchAction:true },
  { key:"claude_config", name:"启动配置", desc:"确保 Claude Code 能正常启动的配置文件" },
  { key:"path_issues", name:"用户名检查", desc:"检查电脑用户名有没有中文字符（可能导致问题）" },
];

function renderCard(item, data) {
  let status, icon, detail, action = "";
  if (item.key === "nodejs") {
    status = data.installed ? "ok" : "err";
    icon = data.installed ? "✅" : "❌";
    detail = data.installed ? `已装好，版本 ${data.version}` : "还没装呢 — 没有它 Claude Code 跑不了";
  } else if (item.key === "git") {
    status = data.installed ? "ok" : "err";
    icon = data.installed ? "✅" : "❌";
    detail = data.installed ? `已装好，${data.version}` : "还没装 — Windows 上 Claude Code 需要它";
  } else if (item.key === "powershell_policy") {
    status = data.need_fix ? "warn" : "ok";
    icon = data.need_fix ? "⚠️" : "✅";
    detail = data.need_fix ? "太严格了，需要放松一点点" : "设置正常，不会影响安装";
  } else if (item.key === "npm_registry") {
    status = data.is_mirror ? "ok" : "warn";
    icon = data.is_mirror ? "✅" : "⚠️";
    detail = data.is_mirror ? "已使用国内镜像，下载飞快" : (data.current || "未设置") + " — 建议切换到国内镜像";
  } else if (item.key === "claude_code") {
    status = data.installed ? "ok" : "err";
    icon = data.installed ? "✅" : "❌";
    detail = data.installed ? `已装好！${data.version}` : "还没装 — 别担心，下一步就能一键装好";
  } else if (item.key === "ccswitch") {
    status = data.installed ? "ok" : "warn";
    icon = data.installed ? "✅" : "⚠️";
    detail = data.installed ? `已装好 (${data.type === "desktop" ? "桌面版" : "命令行版"})` : "建议安装，切换 AI 服务商会很方便";
  } else if (item.key === "claude_config") {
    status = data.onboarding_done ? "ok" : "warn";
    icon = data.onboarding_done ? "✅" : "⚠️";
    detail = data.onboarding_done ? "启动配置就绪" : "还没配置（装 Claude Code 时会自动处理好）";
  } else if (item.key === "path_issues") {
    status = data.ok ? "ok" : "warn";
    icon = data.ok ? "✅" : "⚠️";
    detail = data.ok ? "路径没问题" : data.issues.map(i => `${i.path} 含中文字符，可能出问题`).join("; ");
  }

  if (item.installUrl && status === "err") {
    action = `<a href="${item.installUrl}" class="btn btn-primary btn-sm">📥 帮我安装</a>`;
  } else if (item.installUrl && item.key === "ccswitch" && status === "warn") {
    action = `<a href="${item.installUrl}" class="btn btn-outline btn-sm">📥 安装</a>`;
  } else if (item.fixAction === "policy" && status === "warn") {
    action = `<button class="btn btn-outline btn-sm" onclick="quickFixPolicy(this)">🔧 一键修复</button>`;
  } else if (item.fixAction === "registry" && status === "warn") {
    action = `<button class="btn btn-outline btn-sm" onclick="quickFixRegistry(this)">🔧 一键切换到国内</button>`;
  }

  // CC-Switch 一键启动
  if (item.key === "ccswitch" && data.installed) {
    action = `<button class="btn btn-outline btn-sm" onclick="launchCCSwitch(this)">▶ 启动 CC-Switch</button>`;
  }

  return `
  <div class="check-card status-${status}" id="card-${item.key}">
    <div class="flex items-center gap-2">
      <span class="check-icon">${icon}</span>
      <div class="check-body">
        <div class="check-title">${item.name}</div>
        <div class="check-desc">${item.desc}</div>
        <div class="check-detail ${status}">${detail}</div>
      </div>
      <div class="check-action">${action}</div>
    </div>
  </div>`;
}

async function quickFixPolicy(btn) {
  btn.disabled = true; btn.textContent = "⏳ 修复中...";
  const r = await API.fixPolicy();
  if (r.success) {
    showToast("系统安全设置已调整好！", "success");
    updateCard("powershell_policy", { policy:"RemoteSigned", need_fix:false, ok:true });
  } else {
    showToast("修复失败：" + (r.error || "未知错误"), "error");
    btn.disabled = false; btn.textContent = "🔧 一键修复";
  }
}

async function quickFixRegistry(btn) {
  btn.disabled = true; btn.textContent = "⏳ 切换中...";
  const r = await API.fixRegistry();
  if (r.success) {
    showToast("已切换到国内镜像，下载更快了！", "success");
    updateCard("npm_registry", { current:"https://registry.npmmirror.com/", is_mirror:true, ok:true });
  } else {
    showToast("切换失败", "error");
    btn.disabled = false; btn.textContent = "🔧 一键切换";
  }
}

async function launchCCSwitch(btn) {
  btn.disabled = true; btn.textContent = "⏳ 启动中...";
  const r = await API.launchCCSwitch();
  if (r.success) {
    showToast("CC-Switch 已启动！", "success");
  } else {
    showToast(r.error || "启动失败，请从开始菜单手动打开", "warning");
  }
  btn.disabled = false; btn.textContent = "▶ 启动 CC-Switch";
}

function updateCard(key, data) {
  const item = ITEMS.find(i => i.key === key);
  if (!item) return;
  const old = document.getElementById(`card-${key}`);
  if (old) old.outerHTML = renderCard(item, data);
  const cache = getCache() || {};
  if (cache[key]) Object.assign(cache[key], data);
  setCache(cache);
}

function renderSummary(results) {
  const box = document.getElementById("summary-box");
  const icon = document.getElementById("summary-icon");
  const title = document.getElementById("summary-title");
  const detail = document.getElementById("summary-detail");
  const btns = document.getElementById("action-buttons");
  box.style.display = "block";

  if (results.ready) {
    box.classList.add("ready");
    icon.textContent = "🎉"; title.textContent = "一切就绪！";
    detail.textContent = "电脑环境完全 OK，可以直接配置 AI 服务开始使用了";
    btns.innerHTML = `
      <a href="/wizard/config" class="btn btn-accent">⚙️ 下一步：接上 AI 大脑</a>
      <a href="/wizard/final" class="btn btn-outline">🎯 跳到最后一步</a>`;
  } else {
    icon.textContent = "🔧"; title.textContent = "还需要处理几项";
    let issues = [];
    if (!results.nodejs.installed) issues.push("Node.js");
    if (!results.git.installed) issues.push("Git");
    if (!results.claude_code.installed) issues.push("Claude Code");
    if (results.powershell_policy.need_fix) issues.push("安全设置");
    if (!results.npm_registry.is_mirror) issues.push("镜像源");
    detail.textContent = `还有 ${issues.length} 项需要处理：${issues.join("、")}`;
    let html = "";
    if (!results.nodejs.installed) html += `<a href="/wizard/nodejs" class="btn btn-primary">📥 装 Node.js</a>`;
    if (!results.git.installed) html += `<a href="/wizard/git" class="btn btn-primary">📥 装 Git</a>`;
    if (results.powershell_policy.need_fix) html += `<button class="btn btn-outline" onclick="quickFixPolicy(this)">🔧 修复安全设置</button>`;
    if (!results.claude_code.installed && results.nodejs.installed) html += `<a href="/wizard/claude" class="btn btn-primary">📥 装 Claude Code</a>`;
    if (!results.ccswitch.installed) html += `<a href="/wizard/ccswitch" class="btn btn-outline">📥 装 CC-Switch</a>`;
    btns.innerHTML = html || '<span class="text-muted">请先装好 Node.js 和 Git</span>';
  }
}

(async function() {
  let data = getCache();
  if (!data) {
    try {
      const resp = await API.checkAll();
      if (!resp.success) throw new Error("检测失败");
      data = resp.data;
      setCache(data);
    } catch (e) {
      document.getElementById("loading").innerHTML = `<p style="color:var(--red);">❌ 检测出错了: ${e.message}</p><button class="btn btn-outline mt-2" onclick="location.reload()">🔄 再试一次</button>`;
      return;
    }
  }
  document.getElementById("loading").style.display = "none";
  document.getElementById("results").style.display = "block";
  document.getElementById("last-time").textContent = new Date().toLocaleTimeString();

  let cards = "";
  for (const item of ITEMS) cards += renderCard(item, data[item.key] || {});
  document.getElementById("check-list").innerHTML = cards;
  renderSummary(data);
})();
</script>
{% endblock %}
