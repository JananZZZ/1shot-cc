{% extends "base.html" %}
{% block content %}
<h2>📦 安装 Git for Windows</h2>
<p class="text-muted mb-2">Git 是版本管理工具，Windows 下 Claude Code 需要它。</p>

<div class="card">
  <div id="install-status" class="text-center" style="padding:20px;">
    <div id="install-status-icon" style="font-size:3rem;">📦</div>
    <h3 id="install-status-text" class="mt-1">准备安装 Git for Windows</h3>
    <p class="text-muted text-sm">安装包约 60MB，将从国内镜像下载</p>

    <div class="progress-bar mt-2">
      <div class="fill" id="install-progress-bar" style="width:0%;"></div>
    </div>
    <p id="install-progress-text" class="text-sm text-muted">等待开始...</p>

    <button class="btn btn-primary mt-2" id="install-start-btn" onclick="startInstall()">⬇️ 一键下载安装 Git</button>
    <button class="btn btn-outline mt-2" id="install-retry-btn" style="display:none;" onclick="startInstall()">🔄 重试</button>

    <div id="install-next-step" class="mt-2" style="display:none;">
      <a href="/wizard/claude" class="btn btn-primary">继续 → Claude Code 安装</a>
    </div>
  </div>
</div>

<div class="card mt-2">
  <div class="card-header">📋 安装说明</div>
  <ul class="text-sm text-muted" style="padding-left:20px;">
    <li>下载源：<code>npmmirror.com</code> 国内镜像</li>
    <li>如果已经安装了 Git，可<a href="/wizard/check">返回检测页</a></li>
  </ul>
</div>
{% endblock %}

{% block scripts %}
<script>
const wizard = new InstallWizard(
  () => API.installGit(),
  { title: "安装 Git", successMsg: "Git for Windows 安装完成！" }
);

function startInstall() { wizard.start(); }
</script>
{% endblock %}
