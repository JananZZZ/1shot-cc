{% extends "base.html" %}
{% block content %}
<div class="celebrate-section">
  <div class="celebrate-emoji">👋</div>
  <h1 class="fs-xl mt-1">卸载完成</h1>
  <p class="text-muted">感谢使用 1shot-CC，期待下次遇见</p>
  <p class="text-muted mt-1" style="font-family:'Noto Serif SC',serif; font-style:italic; font-size:1.05rem;">
    永远相信美好的事情即将发生
  </p>
</div>
<div class="wizard-nav">
  <a href="/" class="btn btn-outline">🏠 回到首页</a>
  <button class="btn btn-accent" onclick="exitApp()">🚪 退出程序</button>
</div>
{% endblock %}
{% block scripts %}
<script>
async function exitApp(){try{await fetch('/api/system/shutdown',{method:'POST'});showToast('程序已退出','success');}catch(e){}}
</script>
{% endblock %}
